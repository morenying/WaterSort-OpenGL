  <text x="740" y="410" text-anchor="middle" fill="#ea80fc" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">🔧 GLU</text>
  <text x="740" y="435" text-anchor="middle" fill="#ea80fc" font-size="13" font-family="KaiTi, STKaiti, serif">OpenGL工具库</text>
  <text x="740" y="460" text-anchor="middle" fill="#ea80fc" font-size="11" font-family="KaiTi, STKaiti, serif">gluCylinder/gluSphere</text>
  <text x="740" y="480" text-anchor="middle" fill="#ea80fc" font-size="11" font-family="KaiTi, STKaiti, serif">gluLookAt/gluPerspective</text>
  <path d="M640 440 Q550 400 540 340" stroke="#ea80fc" stroke-width="2" fill="none" opacity="0.7"/>
  <circle cx="540" cy="340" r="4" fill="#ea80fc"/>
  <rect x="350" y="480" width="200" height="100" rx="15" fill="rgba(255,215,0,0.12)" stroke="url(#galaxyGold)" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="510" text-anchor="middle" fill="#ffd700" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">🪟 Windows API</text>
  <text x="450" y="535" text-anchor="middle" fill="#ffaa00" font-size="11" font-family="KaiTi, STKaiti, serif">comdlg32.lib</text>
