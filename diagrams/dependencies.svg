  <text x="740" y="180" text-anchor="middle" fill="#60efff" font-size="11" font-family="KaiTi, STKaiti, serif">OpenGL扩展加载</text>
  <text x="740" y="200" text-anchor="middle" fill="#60efff" font-size="11" font-family="KaiTi, STKaiti, serif">glew32.dll</text>
  <path d="M640 160 Q550 200 540 260" stroke="#60efff" stroke-width="2" fill="none" opacity="0.7"/>
