<?xml version="1.0" encoding="UTF-8"?>
<svg width="950" height="650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="auroraBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1b263b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a192f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff87;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60efff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60efff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c4dff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b388ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea80fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="galaxyGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#00ff87"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#60efff"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#b388ff"/>
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffd700"/>
    </marker>
  </defs>

  <!-- 星空背景 -->
  <rect width="950" height="650" fill="url(#auroraBg)"/>
  
  <!-- 星星点缀 -->
  <circle cx="50" cy="50" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="150" cy="30" r="1" fill="white" opacity="0.6"/>
  <circle cx="280" cy="65" r="2" fill="white" opacity="0.9"/>
  <circle cx="400" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="520" cy="55" r="1" fill="white" opacity="0.5"/>
  <circle cx="650" cy="40" r="2" fill="white" opacity="0.8"/>
  <circle cx="780" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="880" cy="35" r="1" fill="white" opacity="0.9"/>
  <circle cx="920" cy="70" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="100" cy="620" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="300" cy="635" r="1" fill="white" opacity="0.5"/>
  <circle cx="500" cy="610" r="2" fill="white" opacity="0.8"/>
  <circle cx="700" cy="625" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="850" cy="605" r="1" fill="white" opacity="0.9"/>
  
  <!-- 极光效果 -->
  <ellipse cx="475" cy="60" rx="420" ry="40" fill="url(#auroraGreen)" opacity="0.12" filter="url(#glowStrong)"/>
  <ellipse cx="400" cy="630" rx="380" ry="35" fill="url(#auroraBlue)" opacity="0.10" filter="url(#glowStrong)"/>
  
  <!-- 标题 -->
  <text x="475" y="50" text-anchor="middle" fill="url(#auroraGreen)" font-size="26" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">
    ✦ 游戏状态机 ✦
  </text>
  
  <!-- 启动状态 -->
  <circle cx="100" cy="320" r="25" fill="rgba(0,255,135,0.3)" stroke="#00ff87" stroke-width="3" filter="url(#glow)"/>
  <text x="100" y="325" text-anchor="middle" fill="#00ff87" font-size="12" font-family="KaiTi, STKaiti, serif">启动</text>
  
  <!-- STATE_MENU -->
  <rect x="180" y="280" width="160" height="80" rx="40" fill="rgba(96,239,255,0.15)" stroke="#60efff" stroke-width="3" filter="url(#glow)"/>
  <text x="260" y="315" text-anchor="middle" fill="#60efff" font-size="15" font-weight="bold" font-family="KaiTi, STKaiti, serif">STATE_MENU</text>
  <text x="260" y="340" text-anchor="middle" fill="#00d4aa" font-size="11" font-family="KaiTi, STKaiti, serif">主菜单</text>
  
  <!-- STATE_RULES -->
  <rect x="180" y="120" width="160" height="80" rx="40" fill="rgba(124,77,255,0.15)" stroke="#7c4dff" stroke-width="3"/>
  <text x="260" y="155" text-anchor="middle" fill="#b388ff" font-size="15" font-weight="bold" font-family="KaiTi, STKaiti, serif">STATE_RULES</text>
  <text x="260" y="180" text-anchor="middle" fill="#7c4dff" font-size="11" font-family="KaiTi, STKaiti, serif">游戏规则</text>
  
  <!-- STATE_DEMO -->
  <rect x="180" y="440" width="160" height="80" rx="40" fill="rgba(255,215,0,0.15)" stroke="#ffd700" stroke-width="3"/>
  <text x="260" y="475" text-anchor="middle" fill="#ffd700" font-size="15" font-weight="bold" font-family="KaiTi, STKaiti, serif">STATE_DEMO</text>
  <text x="260" y="500" text-anchor="middle" fill="#ffaa00" font-size="11" font-family="KaiTi, STKaiti, serif">演示模式</text>
  
  <!-- STATE_PLAYING -->
  <rect x="450" y="280" width="180" height="80" rx="40" fill="rgba(0,255,135,0.2)" stroke="#00ff87" stroke-width="3" filter="url(#glow)"/>
  <text x="540" y="315" text-anchor="middle" fill="#00ff87" font-size="15" font-weight="bold" font-family="KaiTi, STKaiti, serif">STATE_PLAYING</text>
  <text x="540" y="340" text-anchor="middle" fill="#00d4aa" font-size="11" font-family="KaiTi, STKaiti, serif">游戏进行中</text>
  
  <!-- STATE_WON -->
  <rect x="720" y="280" width="160" height="80" rx="40" fill="rgba(234,128,252,0.2)" stroke="#ea80fc" stroke-width="3" filter="url(#glow)"/>
  <text x="800" y="315" text-anchor="middle" fill="#ea80fc" font-size="15" font-weight="bold" font-family="KaiTi, STKaiti, serif">STATE_WON</text>
  <text x="800" y="340" text-anchor="middle" fill="#b388ff" font-size="11" font-family="KaiTi, STKaiti, serif">胜利画面</text>

  <!-- 连接线 - 启动到菜单 -->
  <path d="M125 320 L175 320" stroke="#00ff87" stroke-width="2" marker-end="url(#arrowGreen)" filter="url(#glow)"/>
  
  <!-- 菜单到规则 -->
  <path d="M260 280 L260 205" stroke="#7c4dff" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="275" y="245" fill="#b388ff" font-size="10" font-family="KaiTi, STKaiti, serif">Rules</text>
  
  <!-- 规则返回菜单 -->
  <path d="M230 200 L230 275" stroke="#60efff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="200" y="245" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">Back</text>
  
  <!-- 菜单到演示 -->
  <path d="M260 360 L260 435" stroke="#ffd700" stroke-width="2" marker-end="url(#arrowGold)"/>
  <text x="275" y="400" fill="#ffd700" font-size="10" font-family="KaiTi, STKaiti, serif">Demo</text>
  
  <!-- 演示返回菜单 -->
  <path d="M230 440 L230 365" stroke="#60efff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="200" y="400" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">Back</text>
  
  <!-- 菜单到游戏 -->
  <path d="M340 320 L445 320" stroke="#00ff87" stroke-width="3" marker-end="url(#arrowGreen)" filter="url(#glow)"/>
  <text x="390" y="310" fill="#00ff87" font-size="11" font-family="KaiTi, STKaiti, serif">Start Game</text>
  
  <!-- 游戏到胜利 -->
  <path d="M630 320 L715 320" stroke="#ea80fc" stroke-width="3" marker-end="url(#arrowPurple)" filter="url(#glow)"/>
  <text x="670" y="310" fill="#ea80fc" font-size="11" font-family="KaiTi, STKaiti, serif">Win!</text>
  
  <!-- 胜利返回菜单 -->
  <path d="M800 280 Q800 100 400 100 Q260 100 260 115" stroke="#60efff" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowBlue)"/>
  <text x="530" y="90" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">Menu</text>
  
  <!-- 胜利到下一关 -->
  <path d="M720 340 Q650 400 540 365" stroke="#00ff87" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowGreen)"/>
  <text x="620" y="390" fill="#00ff87" font-size="10" font-family="KaiTi, STKaiti, serif">Next Level</text>
  
  <!-- 游戏返回菜单 -->
  <path d="M540 280 Q540 200 400 200 Q340 200 340 275" stroke="#60efff" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowBlue)"/>
  <text x="440" y="190" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">ESC/Menu</text>
  
  <!-- 说明面板 -->
  <rect x="650" y="450" width="270" height="170" rx="12" fill="rgba(96,239,255,0.08)" stroke="#60efff" stroke-width="2"/>
  <text x="785" y="480" text-anchor="middle" fill="#60efff" font-size="14" font-weight="bold" font-family="KaiTi, STKaiti, serif">◈ 状态说明 ◈</text>
  <text x="665" y="510" fill="#00ff87" font-size="11" font-family="KaiTi, STKaiti, serif">● MENU - 选择难度/加载关卡</text>
  <text x="665" y="535" fill="#b388ff" font-size="11" font-family="KaiTi, STKaiti, serif">● RULES - 查看游戏规则</text>
  <text x="665" y="560" fill="#ffd700" font-size="11" font-family="KaiTi, STKaiti, serif">● DEMO - 自动演示模式</text>
  <text x="665" y="585" fill="#00d4aa" font-size="11" font-family="KaiTi, STKaiti, serif">● PLAYING - 玩家操作中</text>
  <text x="665" y="610" fill="#ea80fc" font-size="11" font-family="KaiTi, STKaiti, serif">● WON - 显示得分评级</text>
  
  <!-- 图例 -->
  <rect x="30" y="450" width="200" height="120" rx="12" fill="rgba(255,215,0,0.08)" stroke="#ffd700" stroke-width="2"/>
  <text x="130" y="480" text-anchor="middle" fill="#ffd700" font-size="14" font-weight="bold" font-family="KaiTi, STKaiti, serif">◈ 图例 ◈</text>
  <line x1="50" y1="510" x2="100" y2="510" stroke="#00ff87" stroke-width="3"/>
  <text x="115" y="515" fill="#00d4aa" font-size="11" font-family="KaiTi, STKaiti, serif">主要转换</text>
  <line x1="50" y1="540" x2="100" y2="540" stroke="#60efff" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="115" y="545" fill="#60efff" font-size="11" font-family="KaiTi, STKaiti, serif">返回/可选</text>
</svg>
