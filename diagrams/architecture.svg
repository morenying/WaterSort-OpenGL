<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 极光渐变背景 -->
    <linearGradient id="auroraBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1b263b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a192f;stop-opacity:1" />
    </linearGradient>
    <!-- 极光绿蓝渐变 -->
    <linearGradient id="auroraGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff87;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60efff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60efff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c4dff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b388ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea80fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="galaxyGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>
    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 星星 -->
    <radialGradient id="starGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- 星空背景 -->
  <rect width="900" height="700" fill="url(#auroraBg)"/>
  
  <!-- 星星点缀 -->
  <circle cx="50" cy="80" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="150" cy="40" r="1" fill="white" opacity="0.6"/>
  <circle cx="280" cy="90" r="2" fill="white" opacity="0.9"/>
  <circle cx="400" cy="30" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="520" cy="70" r="1" fill="white" opacity="0.5"/>
  <circle cx="650" cy="45" r="2" fill="white" opacity="0.8"/>
  <circle cx="780" cy="85" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="850" cy="35" r="1" fill="white" opacity="0.9"/>
  <circle cx="100" cy="650" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="300" cy="680" r="1" fill="white" opacity="0.5"/>
  <circle cx="500" cy="660" r="2" fill="white" opacity="0.8"/>
  <circle cx="700" cy="640" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="820" cy="670" r="1" fill="white" opacity="0.9"/>
  <circle cx="70" cy="300" r="1" fill="white" opacity="0.5"/>
  <circle cx="830" cy="350" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="60" cy="500" r="1" fill="white" opacity="0.6"/>
  <circle cx="840" cy="480" r="1.5" fill="white" opacity="0.8"/>
  
  <!-- 极光效果 -->
  <ellipse cx="450" cy="100" rx="400" ry="60" fill="url(#auroraGreen)" opacity="0.15" filter="url(#glowStrong)"/>
  <ellipse cx="300" cy="650" rx="350" ry="50" fill="url(#auroraBlue)" opacity="0.12" filter="url(#glowStrong)"/>
  
  <!-- 标题 -->
  <text x="450" y="55" text-anchor="middle" fill="url(#auroraGreen)" font-size="28" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">
    ✦ Water Sort Puzzle 系统架构 ✦
  </text>
  
  <!-- 状态管理层 -->
  <rect x="60" y="100" width="780" height="100" rx="15" fill="rgba(0,255,135,0.08)" stroke="url(#auroraGreen)" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="130" text-anchor="middle" fill="#00ff87" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">◈ 状态管理层 ◈</text>
  
  <!-- 状态节点 -->
  <rect x="80" y="145" width="130" height="45" rx="22" fill="rgba(0,212,170,0.2)" stroke="#00d4aa" stroke-width="2"/>
  <text x="145" y="173" text-anchor="middle" fill="#60efff" font-size="13" font-family="KaiTi, STKaiti, serif">STATE_MENU</text>
  
  <rect x="230" y="145" width="130" height="45" rx="22" fill="rgba(96,239,255,0.2)" stroke="#60efff" stroke-width="2"/>
  <text x="295" y="173" text-anchor="middle" fill="#60efff" font-size="13" font-family="KaiTi, STKaiti, serif">STATE_PLAYING</text>
  
  <rect x="380" y="145" width="130" height="45" rx="22" fill="rgba(124,77,255,0.2)" stroke="#7c4dff" stroke-width="2"/>
  <text x="445" y="173" text-anchor="middle" fill="#b388ff" font-size="13" font-family="KaiTi, STKaiti, serif">STATE_RULES</text>
  
  <rect x="530" y="145" width="130" height="45" rx="22" fill="rgba(234,128,252,0.2)" stroke="#ea80fc" stroke-width="2"/>
  <text x="595" y="173" text-anchor="middle" fill="#ea80fc" font-size="13" font-family="KaiTi, STKaiti, serif">STATE_WON</text>
  
  <rect x="680" y="145" width="130" height="45" rx="22" fill="rgba(255,215,0,0.2)" stroke="#ffd700" stroke-width="2"/>
  <text x="745" y="173" text-anchor="middle" fill="#ffd700" font-size="13" font-family="KaiTi, STKaiti, serif">STATE_DEMO</text>
  
  <!-- 连接箭头 -->
  <path d="M450 200 L450 230" stroke="url(#auroraGreen)" stroke-width="3" filter="url(#glow)"/>
  <polygon points="445,230 450,245 455,230" fill="#00ff87" filter="url(#glow)"/>
  
  <!-- 游戏核心层 -->
  <rect x="60" y="250" width="780" height="130" rx="15" fill="rgba(96,239,255,0.08)" stroke="url(#auroraBlue)" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="280" text-anchor="middle" fill="#60efff" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">◈ 游戏核心层 ◈</text>
  
  <!-- 核心模块 -->
  <rect x="80" y="295" width="170" height="70" rx="12" fill="rgba(0,255,135,0.15)" stroke="#00ff87" stroke-width="2"/>
  <text x="165" y="325" text-anchor="middle" fill="#00ff87" font-size="14" font-family="KaiTi, STKaiti, serif">🎮 关卡管理</text>
  <text x="165" y="350" text-anchor="middle" fill="#00d4aa" font-size="11" font-family="KaiTi, STKaiti, serif">Easy/Medium/Hard/Custom</text>
  
  <rect x="270" y="295" width="170" height="70" rx="12" fill="rgba(96,239,255,0.15)" stroke="#60efff" stroke-width="2"/>
  <text x="355" y="325" text-anchor="middle" fill="#60efff" font-size="14" font-family="KaiTi, STKaiti, serif">🧠 游戏逻辑</text>
  <text x="355" y="350" text-anchor="middle" fill="#00bcd4" font-size="11" font-family="KaiTi, STKaiti, serif">canPour / checkWin</text>
  
  <rect x="460" y="295" width="170" height="70" rx="12" fill="rgba(124,77,255,0.15)" stroke="#7c4dff" stroke-width="2"/>
  <text x="545" y="325" text-anchor="middle" fill="#b388ff" font-size="14" font-family="KaiTi, STKaiti, serif">🎬 动画系统</text>
  <text x="545" y="350" text-anchor="middle" fill="#7c4dff" font-size="11" font-family="KaiTi, STKaiti, serif">倾倒/液流/物理</text>
  
  <rect x="650" y="295" width="170" height="70" rx="12" fill="rgba(255,215,0,0.15)" stroke="#ffd700" stroke-width="2"/>
  <text x="735" y="325" text-anchor="middle" fill="#ffd700" font-size="14" font-family="KaiTi, STKaiti, serif">🏆 得分系统</text>
  <text x="735" y="350" text-anchor="middle" fill="#ffaa00" font-size="11" font-family="KaiTi, STKaiti, serif">效率/难度/完美</text>
  
  <!-- 连接箭头 -->
  <path d="M450 380 L450 410" stroke="url(#auroraBlue)" stroke-width="3" filter="url(#glow)"/>
  <polygon points="445,410 450,425 455,410" fill="#60efff" filter="url(#glow)"/>
  
  <!-- 渲染层 -->
  <rect x="60" y="430" width="780" height="130" rx="15" fill="rgba(124,77,255,0.08)" stroke="url(#auroraPurple)" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="460" text-anchor="middle" fill="#b388ff" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">◈ 渲染层 (OpenGL) ◈</text>
  
  <!-- 渲染模块 -->
  <rect x="80" y="475" width="170" height="70" rx="12" fill="rgba(234,128,252,0.15)" stroke="#ea80fc" stroke-width="2"/>
  <text x="165" y="505" text-anchor="middle" fill="#ea80fc" font-size="14" font-family="KaiTi, STKaiti, serif">🍾 3D瓶子渲染</text>
  <text x="165" y="530" text-anchor="middle" fill="#b388ff" font-size="11" font-family="KaiTi, STKaiti, serif">玻璃/液体效果</text>
  
  <rect x="270" y="475" width="170" height="70" rx="12" fill="rgba(0,188,212,0.15)" stroke="#00bcd4" stroke-width="2"/>
  <text x="355" y="505" text-anchor="middle" fill="#00bcd4" font-size="14" font-family="KaiTi, STKaiti, serif">✨ GLSL着色器</text>
  <text x="355" y="530" text-anchor="middle" fill="#60efff" font-size="11" font-family="KaiTi, STKaiti, serif">液体裁剪渲染</text>
  
  <rect x="460" y="475" width="170" height="70" rx="12" fill="rgba(0,255,135,0.15)" stroke="#00ff87" stroke-width="2"/>
  <text x="545" y="505" text-anchor="middle" fill="#00ff87" font-size="14" font-family="KaiTi, STKaiti, serif">📊 UI界面</text>
  <text x="545" y="530" text-anchor="middle" fill="#00d4aa" font-size="11" font-family="KaiTi, STKaiti, serif">菜单/信息面板</text>
  
  <rect x="650" y="475" width="170" height="70" rx="12" fill="rgba(255,215,0,0.15)" stroke="#ffd700" stroke-width="2"/>
  <text x="735" y="505" text-anchor="middle" fill="#ffd700" font-size="14" font-family="KaiTi, STKaiti, serif">💡 光照系统</text>
  <text x="735" y="530" text-anchor="middle" fill="#ffaa00" font-size="11" font-family="KaiTi, STKaiti, serif">三光源照明</text>
  
  <!-- 连接箭头 -->
  <path d="M450 560 L450 590" stroke="url(#auroraPurple)" stroke-width="3" filter="url(#glow)"/>
  <polygon points="445,590 450,605 455,590" fill="#b388ff" filter="url(#glow)"/>
  
  <!-- 交互层 -->
  <rect x="60" y="610" width="780" height="75" rx="15" fill="rgba(255,215,0,0.08)" stroke="url(#galaxyGold)" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="640" text-anchor="middle" fill="#ffd700" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">◈ 交互层 ◈</text>
  
  <!-- 交互模块 -->
  <rect x="100" y="655" width="150" height="25" rx="12" fill="rgba(0,255,135,0.2)" stroke="#00ff87" stroke-width="1"/>
  <text x="175" y="672" text-anchor="middle" fill="#00ff87" font-size="11" font-family="KaiTi, STKaiti, serif">🖱️ 鼠标点击/悬停</text>
  
  <rect x="280" y="655" width="150" height="25" rx="12" fill="rgba(96,239,255,0.2)" stroke="#60efff" stroke-width="1"/>
  <text x="355" y="672" text-anchor="middle" fill="#60efff" font-size="11" font-family="KaiTi, STKaiti, serif">⌨️ 键盘控制</text>
  
  <rect x="460" y="655" width="150" height="25" rx="12" fill="rgba(124,77,255,0.2)" stroke="#7c4dff" stroke-width="1"/>
  <text x="535" y="672" text-anchor="middle" fill="#b388ff" font-size="11" font-family="KaiTi, STKaiti, serif">🎯 颜色拾取检测</text>
  
  <rect x="640" y="655" width="150" height="25" rx="12" fill="rgba(255,215,0,0.2)" stroke="#ffd700" stroke-width="1"/>
  <text x="715" y="672" text-anchor="middle" fill="#ffd700" font-size="11" font-family="KaiTi, STKaiti, serif">📁 文件导入</text>
</svg>
