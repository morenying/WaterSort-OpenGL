  <text x="430" y="195" fill="#7c4dff" font-size="11" font-family="KaiTi, STKaiti, serif">版本 17.x (v18)</text>
  <rect x="340" y="210" width="220" height="25" rx="5" fill="rgba(234,128,252,0.15)" stroke="#ea80fc" stroke-width="1"/>
