  <text x="660" y="330" text-anchor="middle" fill="#ea80fc" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">📋 运行时要求</text>
  <text x="480" y="360" fill="#b388ff" font-size="12" font-family="KaiTi, STKaiti, serif">• Visual C++ Redistributable 2022</text>
  <text x="480" y="385" fill="#60efff" font-size="12" font-family="KaiTi, STKaiti, serif">• OpenGL 2.0+ 驱动支持</text>
  <text x="480" y="410" fill="#00ff87" font-size="12" font-family="KaiTi, STKaiti, serif">• 运行目录需包含 DLL 文件:</text>
  <text x="500" y="430" fill="#ffd700" font-size="11" font-family="Consolas, monospace">glew32.dll, freeglut.dll, glut32.dll</text>
  <rect x="40" y="450" width="820" height="80" rx="12" fill="rgba(0,0,0,0.3)" stroke="#60efff" stroke-width="1"/>
  <text x="450" y="480" text-anchor="middle" fill="#60efff" font-size="14" font-family="KaiTi, STKaiti, serif">💡 开发提示</text>
  <text x="80" y="510" fill="#00ff87" font-size="11" font-family="KaiTi, STKaiti, serif">• 首次编译需配置 OpenGL 头文件和库文件路径</text>
  <text x="450" y="510" fill="#b388ff" font-size="11" font-family="KaiTi, STKaiti, serif">• 建议使用 Debug 配置进行开发调试</text>
</svg>