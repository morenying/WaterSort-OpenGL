  <text x="335" y="375" text-anchor="middle" fill="#60efff" font-size="14" font-family="KaiTi, STKaiti, serif">配置模式</text>
  <text x="335" y="400" text-anchor="middle" fill="#00bcd4" font-size="16" font-family="Consolas, monospace">Debug / Release</text>
