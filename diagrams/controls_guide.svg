<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 极光渐变背景 -->
    <linearGradient id="auroraBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1b263b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a192f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff87;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60efff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60efff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c4dff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b388ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea80fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="galaxyGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 星空背景 -->
  <rect width="900" height="600" fill="url(#auroraBg)"/>
  
  <!-- 星星点缀 -->
  <circle cx="50" cy="80" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="150" cy="40" r="1" fill="white" opacity="0.6"/>
  <circle cx="280" cy="90" r="2" fill="white" opacity="0.9"/>
  <circle cx="400" cy="30" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="650" cy="45" r="2" fill="white" opacity="0.8"/>
  <circle cx="780" cy="85" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="850" cy="35" r="1" fill="white" opacity="0.9"/>
  <circle cx="70" cy="550" r="1" fill="white" opacity="0.5"/>
  <circle cx="830" cy="520" r="1.5" fill="white" opacity="0.7"/>
  
  <!-- 极光效果 -->
  <ellipse cx="450" cy="80" rx="400" ry="50" fill="url(#auroraGreen)" opacity="0.12" filter="url(#glowStrong)"/>
  <ellipse cx="300" cy="550" rx="350" ry="40" fill="url(#auroraBlue)" opacity="0.1" filter="url(#glowStrong)"/>
  
  <!-- 标题 -->
  <text x="450" y="50" text-anchor="middle" fill="url(#auroraGreen)" font-size="26" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">
    🎮 操作说明 Controls Guide 🎮
  </text>
  
  <!-- 鼠标操作区域 -->
  <rect x="40" y="80" width="400" height="240" rx="15" fill="rgba(0,255,135,0.08)" stroke="url(#auroraGreen)" stroke-width="2" filter="url(#glow)"/>
  <text x="240" y="110" text-anchor="middle" fill="#00ff87" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">🖱️ 鼠标操作</text>
  
  <!-- 鼠标图标 -->
  <ellipse cx="100" cy="180" rx="30" ry="45" fill="rgba(96,239,255,0.2)" stroke="#60efff" stroke-width="2"/>
  <line x1="100" y1="145" x2="100" y2="175" stroke="#60efff" stroke-width="2"/>
  <ellipse cx="100" cy="160" rx="8" ry="12" fill="#00ff87" opacity="0.8"/>
  
  <!-- 鼠标操作说明 -->
  <rect x="150" y="140" width="270" height="35" rx="8" fill="rgba(0,212,170,0.15)" stroke="#00d4aa" stroke-width="1"/>
  <text x="165" y="163" fill="#00ff87" font-size="13" font-family="KaiTi, STKaiti, serif">左键点击瓶子</text>
  <text x="300" y="163" fill="#60efff" font-size="12" font-family="KaiTi, STKaiti, serif">→ 选择/倾倒</text>
  
  <rect x="150" y="185" width="270" height="35" rx="8" fill="rgba(96,239,255,0.15)" stroke="#60efff" stroke-width="1"/>
  <text x="165" y="208" fill="#00ff87" font-size="13" font-family="KaiTi, STKaiti, serif">鼠标悬停</text>
  <text x="300" y="208" fill="#60efff" font-size="12" font-family="KaiTi, STKaiti, serif">→ 显示瓶子信息</text>
  
  <rect x="150" y="230" width="270" height="35" rx="8" fill="rgba(124,77,255,0.15)" stroke="#7c4dff" stroke-width="1"/>
  <text x="165" y="253" fill="#00ff87" font-size="13" font-family="KaiTi, STKaiti, serif">点击空白处</text>
  <text x="300" y="253" fill="#b388ff" font-size="12" font-family="KaiTi, STKaiti, serif">→ 取消选择</text>
  
  <rect x="150" y="275" width="270" height="35" rx="8" fill="rgba(255,215,0,0.15)" stroke="#ffd700" stroke-width="1"/>
  <text x="165" y="298" fill="#00ff87" font-size="13" font-family="KaiTi, STKaiti, serif">选中后点击目标</text>
  <text x="300" y="298" fill="#ffd700" font-size="12" font-family="KaiTi, STKaiti, serif">→ 执行倾倒</text>
  
  <!-- 键盘操作区域 -->
  <rect x="460" y="80" width="400" height="240" rx="15" fill="rgba(96,239,255,0.08)" stroke="url(#auroraBlue)" stroke-width="2" filter="url(#glow)"/>
  <text x="660" y="110" text-anchor="middle" fill="#60efff" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">⌨️ 键盘操作</text>
  
  <!-- 方向键图示 -->
  <rect x="500" y="150" width="35" height="30" rx="5" fill="rgba(0,255,135,0.3)" stroke="#00ff87" stroke-width="2"/>
  <text x="517" y="170" text-anchor="middle" fill="#00ff87" font-size="14" font-family="Arial">↑</text>
  
  <rect x="480" y="185" width="35" height="30" rx="5" fill="rgba(0,255,135,0.3)" stroke="#00ff87" stroke-width="2"/>
  <text x="497" y="205" text-anchor="middle" fill="#00ff87" font-size="14" font-family="Arial">←</text>
  
  <rect x="520" y="185" width="35" height="30" rx="5" fill="rgba(0,255,135,0.3)" stroke="#00ff87" stroke-width="2"/>
  <text x="537" y="205" text-anchor="middle" fill="#00ff87" font-size="14" font-family="Arial">→</text>
  
  <rect x="500" y="220" width="35" height="30" rx="5" fill="rgba(0,255,135,0.3)" stroke="#00ff87" stroke-width="2"/>
  <text x="517" y="240" text-anchor="middle" fill="#00ff87" font-size="14" font-family="Arial">↓</text>
  
  <!-- 方向键说明 -->
  <text x="580" y="175" fill="#60efff" font-size="12" font-family="KaiTi, STKaiti, serif">菜单选择 / 相机俯仰</text>
  <text x="580" y="210" fill="#60efff" font-size="12" font-family="KaiTi, STKaiti, serif">相机左右旋转</text>
  
  <!-- 功能键 -->
  <rect x="480" y="265" width="50" height="30" rx="5" fill="rgba(234,128,252,0.3)" stroke="#ea80fc" stroke-width="2"/>
  <text x="505" y="285" text-anchor="middle" fill="#ea80fc" font-size="12" font-family="Arial">Enter</text>
  <text x="545" y="285" fill="#b388ff" font-size="12" font-family="KaiTi, STKaiti, serif">确认选择</text>
  
  <rect x="660" y="265" width="30" height="30" rx="5" fill="rgba(255,215,0,0.3)" stroke="#ffd700" stroke-width="2"/>
  <text x="675" y="285" text-anchor="middle" fill="#ffd700" font-size="14" font-family="Arial">R</text>
  <text x="705" y="285" fill="#ffaa00" font-size="12" font-family="KaiTi, STKaiti, serif">重新开始</text>
  
  <rect x="780" y="265" width="30" height="30" rx="5" fill="rgba(0,188,212,0.3)" stroke="#00bcd4" stroke-width="2"/>
  <text x="795" y="285" text-anchor="middle" fill="#00bcd4" font-size="14" font-family="Arial">M</text>
  <text x="825" y="285" fill="#60efff" font-size="12" font-family="KaiTi, STKaiti, serif">菜单</text>
  
  <!-- 游戏流程区域 -->
  <rect x="40" y="340" width="820" height="110" rx="15" fill="rgba(124,77,255,0.08)" stroke="url(#auroraPurple)" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="370" text-anchor="middle" fill="#b388ff" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">🎯 游戏操作流程</text>
  
  <!-- 流程步骤 -->
  <rect x="60" y="390" width="140" height="45" rx="22" fill="rgba(0,255,135,0.2)" stroke="#00ff87" stroke-width="2"/>
  <text x="130" y="418" text-anchor="middle" fill="#00ff87" font-size="13" font-family="KaiTi, STKaiti, serif">① 点击源瓶</text>
  
  <path d="M205 412 L235 412" stroke="#60efff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <polygon points="235,408 245,412 235,416" fill="#60efff"/>
  
  <rect x="250" y="390" width="140" height="45" rx="22" fill="rgba(96,239,255,0.2)" stroke="#60efff" stroke-width="2"/>
  <text x="320" y="418" text-anchor="middle" fill="#60efff" font-size="13" font-family="KaiTi, STKaiti, serif">② 瓶子抬起</text>
  
  <path d="M395 412 L425 412" stroke="#7c4dff" stroke-width="2"/>
  <polygon points="425,408 435,412 425,416" fill="#7c4dff"/>
  
  <rect x="440" y="390" width="140" height="45" rx="22" fill="rgba(124,77,255,0.2)" stroke="#7c4dff" stroke-width="2"/>
  <text x="510" y="418" text-anchor="middle" fill="#b388ff" font-size="13" font-family="KaiTi, STKaiti, serif">③ 点击目标瓶</text>
  
  <path d="M585 412 L615 412" stroke="#ea80fc" stroke-width="2"/>
  <polygon points="615,408 625,412 615,416" fill="#ea80fc"/>
  
  <rect x="630" y="390" width="140" height="45" rx="22" fill="rgba(234,128,252,0.2)" stroke="#ea80fc" stroke-width="2"/>
  <text x="700" y="418" text-anchor="middle" fill="#ea80fc" font-size="13" font-family="KaiTi, STKaiti, serif">④ 自动倾倒</text>
  
  <path d="M775 412 L805 412" stroke="#ffd700" stroke-width="2"/>
  <polygon points="805,408 815,412 805,416" fill="#ffd700"/>
  
  <rect x="820" y="390" width="30" height="45" rx="15" fill="rgba(255,215,0,0.3)" stroke="#ffd700" stroke-width="2"/>
  <text x="835" y="418" text-anchor="middle" fill="#ffd700" font-size="16" font-family="Arial">✓</text>
  
  <!-- 提示区域 -->
  <rect x="40" y="470" width="820" height="110" rx="15" fill="rgba(255,215,0,0.08)" stroke="url(#galaxyGold)" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="500" text-anchor="middle" fill="#ffd700" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">💡 操作提示</text>
  
  <text x="80" y="530" fill="#00ff87" font-size="13" font-family="KaiTi, STKaiti, serif">• 选中瓶子后，可倾倒的目标瓶上方会显示绿色箭头指示</text>
  <text x="80" y="555" fill="#60efff" font-size="13" font-family="KaiTi, STKaiti, serif">• 悬停在瓶子上会显示瓶子编号、层数和顶层颜色信息</text>
  <text x="500" y="530" fill="#b388ff" font-size="13" font-family="KaiTi, STKaiti, serif">• 连续成功倾倒可累积连击奖励</text>
  <text x="500" y="555" fill="#ffd700" font-size="13" font-family="KaiTi, STKaiti, serif">• 一次倒完多层同色液体可获得完美倾倒奖励</text>
</svg>
