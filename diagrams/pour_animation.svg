<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="auroraBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1b263b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a192f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff87;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60efff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60efff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c4dff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b388ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea80fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="galaxyGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="liquidRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="liquidBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60efff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#00bcd4;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="liquidGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff87;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:0.9" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 星空背景 -->
  <rect width="900" height="700" fill="url(#auroraBg)"/>
  
  <!-- 星星点缀 -->
  <circle cx="50" cy="50" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="150" cy="30" r="1" fill="white" opacity="0.6"/>
  <circle cx="280" cy="65" r="2" fill="white" opacity="0.9"/>
  <circle cx="400" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="520" cy="55" r="1" fill="white" opacity="0.5"/>
  <circle cx="650" cy="40" r="2" fill="white" opacity="0.8"/>
  <circle cx="780" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="850" cy="35" r="1" fill="white" opacity="0.9"/>
  <circle cx="100" cy="670" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="300" cy="685" r="1" fill="white" opacity="0.5"/>
  <circle cx="500" cy="660" r="2" fill="white" opacity="0.8"/>
  <circle cx="700" cy="675" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="830" cy="655" r="1" fill="white" opacity="0.9"/>
  
  <!-- 极光效果 -->
  <ellipse cx="450" cy="60" rx="400" ry="40" fill="url(#auroraGreen)" opacity="0.12" filter="url(#glowStrong)"/>
  <ellipse cx="350" cy="680" rx="380" ry="35" fill="url(#auroraBlue)" opacity="0.10" filter="url(#glowStrong)"/>
  
  <!-- 标题 -->
  <text x="450" y="50" text-anchor="middle" fill="url(#auroraBlue)" font-size="26" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">
    ✦ 倒水动画系统 ✦
  </text>

  <!-- 动画阶段流程 -->
  <rect x="30" y="80" width="840" height="180" rx="15" fill="rgba(96,239,255,0.06)" stroke="url(#auroraBlue)" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="110" text-anchor="middle" fill="#60efff" font-size="18" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">◈ 动画阶段流程 ◈</text>

  <!-- 阶段1: 选中 -->
  <rect x="55" y="130" width="120" height="110" rx="10" fill="rgba(0,0,0,0.3)" stroke="#00ff87" stroke-width="2"/>
  <text x="115" y="155" text-anchor="middle" fill="#00ff87" font-size="12" font-weight="bold" font-family="KaiTi, STKaiti, serif">① 选中瓶子</text>
  <rect x="75" y="170" width="30" height="55" rx="4" fill="rgba(96,239,255,0.15)" stroke="#60efff" stroke-width="1.5"/>
  <rect x="79" y="195" width="22" height="25" rx="2" fill="url(#liquidRed)"/>
  <text x="115" y="175" fill="#ffd700" font-size="9" font-family="KaiTi, STKaiti, serif">↑ 上移</text>
  <text x="115" y="230" fill="#60efff" font-size="9" font-family="KaiTi, STKaiti, serif">selected=i</text>

  <!-- 箭头1 -->
  <path d="M180 185 L205 185" stroke="#00ff87" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <polygon points="205,185 195,180 195,190" fill="#00ff87"/>

  <!-- 阶段2: 倾斜 -->
  <rect x="215" y="130" width="120" height="110" rx="10" fill="rgba(0,0,0,0.3)" stroke="#60efff" stroke-width="2"/>
  <text x="275" y="155" text-anchor="middle" fill="#60efff" font-size="12" font-weight="bold" font-family="KaiTi, STKaiti, serif">② 瓶子倾斜</text>
  <g transform="translate(255,195) rotate(-35)">
    <rect x="-15" y="-35" width="30" height="55" rx="4" fill="rgba(96,239,255,0.15)" stroke="#60efff" stroke-width="1.5"/>
    <rect x="-11" y="-5" width="22" height="25" rx="2" fill="url(#liquidRed)"/>
  </g>
  <text x="275" y="230" fill="#60efff" font-size="9" font-family="KaiTi, STKaiti, serif">tiltAngle++</text>

  <!-- 箭头2 -->
  <path d="M340 185 L365 185" stroke="#60efff" stroke-width="2" fill="none"/>
  <polygon points="365,185 355,180 355,190" fill="#60efff"/>

  <!-- 阶段3: 液流 -->
  <rect x="375" y="130" width="140" height="110" rx="10" fill="rgba(0,0,0,0.3)" stroke="#ffd700" stroke-width="2"/>
  <text x="445" y="155" text-anchor="middle" fill="#ffd700" font-size="12" font-weight="bold" font-family="KaiTi, STKaiti, serif">③ 液体流动</text>
  <g transform="translate(405,195) rotate(-45)">
    <rect x="-15" y="-35" width="30" height="55" rx="4" fill="rgba(96,239,255,0.15)" stroke="#60efff" stroke-width="1.5"/>
    <rect x="-11" y="5" width="22" height="15" rx="2" fill="url(#liquidRed)"/>
  </g>
  <path d="M430 175 Q455 195 470 215" stroke="#ff6b6b" stroke-width="4" fill="none" filter="url(#glow)"/>
  <rect x="460" y="175" width="30" height="55" rx="4" fill="rgba(96,239,255,0.15)" stroke="#60efff" stroke-width="1.5"/>
  <rect x="464" y="205" width="22" height="20" rx="2" fill="url(#liquidRed)"/>
  <text x="445" y="235" fill="#ffd700" font-size="9" font-family="KaiTi, STKaiti, serif">streamProgress</text>

  <!-- 箭头3 -->
  <path d="M520 185 L545 185" stroke="#ffd700" stroke-width="2" fill="none"/>
  <polygon points="545,185 535,180 535,190" fill="#ffd700"/>

  <!-- 阶段4: 回正 -->
  <rect x="555" y="130" width="120" height="110" rx="10" fill="rgba(0,0,0,0.3)" stroke="#b388ff" stroke-width="2"/>
  <text x="615" y="155" text-anchor="middle" fill="#b388ff" font-size="12" font-weight="bold" font-family="KaiTi, STKaiti, serif">④ 瓶子回正</text>
  <rect x="585" y="170" width="30" height="55" rx="4" fill="rgba(96,239,255,0.15)" stroke="#60efff" stroke-width="1.5"/>
  <rect x="589" y="210" width="22" height="10" rx="2" fill="url(#liquidRed)"/>
  <text x="615" y="230" fill="#b388ff" font-size="9" font-family="KaiTi, STKaiti, serif">tiltAngle--</text>

  <!-- 箭头4 -->
  <path d="M680 185 L705 185" stroke="#b388ff" stroke-width="2" fill="none"/>
  <polygon points="705,185 695,180 695,190" fill="#b388ff"/>

  <!-- 阶段5: 完成 -->
  <rect x="715" y="130" width="130" height="110" rx="10" fill="rgba(0,0,0,0.3)" stroke="#00ff87" stroke-width="2"/>
  <text x="780" y="155" text-anchor="middle" fill="#00ff87" font-size="12" font-weight="bold" font-family="KaiTi, STKaiti, serif">⑤ 动画完成</text>
  <rect x="745" y="170" width="30" height="55" rx="4" fill="rgba(96,239,255,0.15)" stroke="#60efff" stroke-width="1.5"/>
  <rect x="795" y="170" width="30" height="55" rx="4" fill="rgba(96,239,255,0.15)" stroke="#60efff" stroke-width="1.5"/>
  <rect x="799" y="185" width="22" height="35" rx="2" fill="url(#liquidRed)"/>
  <text x="780" y="235" fill="#00ff87" font-size="9" font-family="KaiTi, STKaiti, serif">isPouring=false</text>


  <!-- 状态变量区域 -->
  <rect x="30" y="280" width="400" height="200" rx="15" fill="rgba(124,77,255,0.06)" stroke="url(#auroraPurple)" stroke-width="2" filter="url(#glow)"/>
  <text x="230" y="310" text-anchor="middle" fill="#b388ff" font-size="18" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">◈ 动画状态变量 ◈</text>

  <rect x="50" y="330" width="170" height="130" rx="10" fill="rgba(0,0,0,0.2)" stroke="#7c4dff" stroke-width="1"/>
  <text x="135" y="355" text-anchor="middle" fill="#b388ff" font-size="12" font-weight="bold" font-family="KaiTi, STKaiti, serif">控制变量</text>
  <text x="60" y="380" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">• isPouring: 是否倒水中</text>
  <text x="60" y="400" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">• sourceBottle: 源瓶索引</text>
  <text x="60" y="420" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">• targetBottle: 目标瓶索引</text>
  <text x="60" y="440" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">• selected: 选中瓶索引</text>

  <rect x="240" y="330" width="170" height="130" rx="10" fill="rgba(0,0,0,0.2)" stroke="#00d4aa" stroke-width="1"/>
  <text x="325" y="355" text-anchor="middle" fill="#00ff87" font-size="12" font-weight="bold" font-family="KaiTi, STKaiti, serif">动画参数</text>
  <text x="250" y="380" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">• tiltAngle: 倾斜角度</text>
  <text x="250" y="400" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">• streamProgress: 液流进度</text>
  <text x="250" y="420" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">• pourAmount: 倒出量</text>
  <text x="250" y="440" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">• animationSpeed: 速度</text>

  <!-- 核心函数区域 -->
  <rect x="470" y="280" width="400" height="200" rx="15" fill="rgba(255,215,0,0.06)" stroke="url(#galaxyGold)" stroke-width="2" filter="url(#glow)"/>
  <text x="670" y="310" text-anchor="middle" fill="#ffd700" font-size="18" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">◈ 核心函数 ◈</text>

  <rect x="490" y="330" width="170" height="130" rx="10" fill="rgba(0,0,0,0.2)" stroke="#ffaa00" stroke-width="1"/>
  <text x="575" y="355" text-anchor="middle" fill="#ffd700" font-size="12" font-weight="bold" font-family="KaiTi, STKaiti, serif">startPour()</text>
  <text x="500" y="380" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">1. 验证倒水条件</text>
  <text x="500" y="400" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">2. 设置源/目标瓶</text>
  <text x="500" y="420" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">3. 计算可倒数量</text>
  <text x="500" y="440" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">4. isPouring = true</text>

  <rect x="680" y="330" width="170" height="130" rx="10" fill="rgba(0,0,0,0.2)" stroke="#00ff87" stroke-width="1"/>
  <text x="765" y="355" text-anchor="middle" fill="#00ff87" font-size="12" font-weight="bold" font-family="KaiTi, STKaiti, serif">updatePour()</text>
  <text x="690" y="380" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">1. 更新倾斜角度</text>
  <text x="690" y="400" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">2. 更新液流进度</text>
  <text x="690" y="420" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">3. 转移液体数据</text>
  <text x="690" y="440" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">4. 检测动画结束</text>

  <!-- 时间轴区域 -->
  <rect x="30" y="500" width="840" height="170" rx="15" fill="rgba(0,255,135,0.06)" stroke="url(#auroraGreen)" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="530" text-anchor="middle" fill="#00ff87" font-size="18" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">◈ 动画时间轴 ◈</text>

  <!-- 时间轴线 -->
  <line x1="80" y1="580" x2="820" y2="580" stroke="#60efff" stroke-width="2"/>
  
  <!-- 时间节点 -->
  <circle cx="80" cy="580" r="8" fill="#00ff87" filter="url(#glow)"/>
  <text x="80" y="605" text-anchor="middle" fill="#00ff87" font-size="10" font-family="KaiTi, STKaiti, serif">t=0</text>
  <text x="80" y="625" text-anchor="middle" fill="#60efff" font-size="9" font-family="KaiTi, STKaiti, serif">点击选中</text>

  <circle cx="200" cy="580" r="8" fill="#60efff" filter="url(#glow)"/>
  <text x="200" y="605" text-anchor="middle" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">t=0.1s</text>
  <text x="200" y="625" text-anchor="middle" fill="#60efff" font-size="9" font-family="KaiTi, STKaiti, serif">上移完成</text>

  <circle cx="350" cy="580" r="8" fill="#ffd700" filter="url(#glow)"/>
  <text x="350" y="605" text-anchor="middle" fill="#ffd700" font-size="10" font-family="KaiTi, STKaiti, serif">t=0.3s</text>
  <text x="350" y="625" text-anchor="middle" fill="#60efff" font-size="9" font-family="KaiTi, STKaiti, serif">开始倾斜</text>

  <circle cx="500" cy="580" r="8" fill="#ff6b6b" filter="url(#glow)"/>
  <text x="500" y="605" text-anchor="middle" fill="#ff6b6b" font-size="10" font-family="KaiTi, STKaiti, serif">t=0.5s</text>
  <text x="500" y="625" text-anchor="middle" fill="#60efff" font-size="9" font-family="KaiTi, STKaiti, serif">液流开始</text>

  <circle cx="650" cy="580" r="8" fill="#b388ff" filter="url(#glow)"/>
  <text x="650" y="605" text-anchor="middle" fill="#b388ff" font-size="10" font-family="KaiTi, STKaiti, serif">t=0.8s</text>
  <text x="650" y="625" text-anchor="middle" fill="#60efff" font-size="9" font-family="KaiTi, STKaiti, serif">液流结束</text>

  <circle cx="820" cy="580" r="8" fill="#00ff87" filter="url(#glow)"/>
  <text x="820" y="605" text-anchor="middle" fill="#00ff87" font-size="10" font-family="KaiTi, STKaiti, serif">t=1.0s</text>
  <text x="820" y="625" text-anchor="middle" fill="#60efff" font-size="9" font-family="KaiTi, STKaiti, serif">回正完成</text>

  <!-- 阶段标注 -->
  <rect x="80" y="555" width="120" height="15" rx="3" fill="rgba(0,255,135,0.2)"/>
  <text x="140" y="565" text-anchor="middle" fill="#00ff87" font-size="8" font-family="KaiTi, STKaiti, serif">选中阶段</text>

  <rect x="200" y="555" width="150" height="15" rx="3" fill="rgba(96,239,255,0.2)"/>
  <text x="275" y="565" text-anchor="middle" fill="#60efff" font-size="8" font-family="KaiTi, STKaiti, serif">倾斜阶段</text>

  <rect x="350" y="555" width="300" height="15" rx="3" fill="rgba(255,215,0,0.2)"/>
  <text x="500" y="565" text-anchor="middle" fill="#ffd700" font-size="8" font-family="KaiTi, STKaiti, serif">液流阶段</text>

  <rect x="650" y="555" width="170" height="15" rx="3" fill="rgba(179,136,255,0.2)"/>
  <text x="735" y="565" text-anchor="middle" fill="#b388ff" font-size="8" font-family="KaiTi, STKaiti, serif">回正阶段</text>

  <!-- 底部说明 -->
  <text x="450" y="660" text-anchor="middle" fill="#60efff" font-size="11" font-family="KaiTi, STKaiti, serif">
    💡 动画通过 glutTimerFunc() 以 16ms 间隔更新，实现约 60fps 的流畅效果
  </text>

</svg>
