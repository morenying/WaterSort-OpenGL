<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="auroraBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1b263b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a192f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff87;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60efff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60efff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c4dff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b388ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea80fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="galaxyGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 星空背景 -->
  <rect width="900" height="700" fill="url(#auroraBg)"/>
  
  <!-- 星星点缀 -->
  <circle cx="50" cy="50" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="150" cy="30" r="1" fill="white" opacity="0.6"/>
  <circle cx="280" cy="65" r="2" fill="white" opacity="0.9"/>
  <circle cx="400" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="520" cy="55" r="1" fill="white" opacity="0.5"/>
  <circle cx="650" cy="40" r="2" fill="white" opacity="0.8"/>
  <circle cx="780" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="850" cy="35" r="1" fill="white" opacity="0.9"/>
  <circle cx="100" cy="670" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="300" cy="685" r="1" fill="white" opacity="0.5"/>
  <circle cx="500" cy="660" r="2" fill="white" opacity="0.8"/>
  <circle cx="700" cy="675" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="830" cy="655" r="1" fill="white" opacity="0.9"/>
  
  <!-- 极光效果 -->
  <ellipse cx="450" cy="60" rx="400" ry="40" fill="url(#auroraGreen)" opacity="0.12" filter="url(#glowStrong)"/>
  <ellipse cx="350" cy="680" rx="380" ry="35" fill="url(#auroraBlue)" opacity="0.10" filter="url(#glowStrong)"/>
  
  <!-- 标题 -->
  <text x="450" y="50" text-anchor="middle" fill="url(#auroraGreen)" font-size="26" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">
    ✦ 鼠标交互系统 ✦
  </text>
  
  <!-- 鼠标事件区域 -->
  <rect x="30" y="80" width="400" height="280" rx="15" fill="rgba(96,239,255,0.06)" stroke="url(#auroraBlue)" stroke-width="2" filter="url(#glow)"/>
  <text x="230" y="115" text-anchor="middle" fill="#60efff" font-size="18" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">◈ 鼠标事件处理 ◈</text>
  
  <!-- 点击事件 -->
  <rect x="50" y="135" width="170" height="100" rx="10" fill="rgba(0,255,135,0.15)" stroke="#00ff87" stroke-width="2"/>
  <text x="135" y="165" text-anchor="middle" fill="#00ff87" font-size="14" font-weight="bold" font-family="KaiTi, STKaiti, serif">🖱️ 点击事件</text>
  <text x="135" y="190" text-anchor="middle" fill="#00d4aa" font-size="10" font-family="KaiTi, STKaiti, serif">mouseClick()</text>
  <text x="135" y="210" text-anchor="middle" fill="#60efff" font-size="9" font-family="KaiTi, STKaiti, serif">• 选择源瓶</text>
  <text x="135" y="225" text-anchor="middle" fill="#60efff" font-size="9" font-family="KaiTi, STKaiti, serif">• 选择目标瓶</text>
  
  <!-- 移动事件 -->
  <rect x="240" y="135" width="170" height="100" rx="10" fill="rgba(124,77,255,0.15)" stroke="#7c4dff" stroke-width="2"/>
  <text x="325" y="165" text-anchor="middle" fill="#b388ff" font-size="14" font-weight="bold" font-family="KaiTi, STKaiti, serif">🎯 移动事件</text>
  <text x="325" y="190" text-anchor="middle" fill="#7c4dff" font-size="10" font-family="KaiTi, STKaiti, serif">mouseMove()</text>
  <text x="325" y="210" text-anchor="middle" fill="#60efff" font-size="9" font-family="KaiTi, STKaiti, serif">• 更新悬停状态</text>
  <text x="325" y="225" text-anchor="middle" fill="#60efff" font-size="9" font-family="KaiTi, STKaiti, serif">• 触发重绘</text>
  
  <!-- 颜色拾取 -->
  <rect x="50" y="250" width="360" height="95" rx="10" fill="rgba(255,215,0,0.12)" stroke="#ffd700" stroke-width="2"/>
  <text x="230" y="280" text-anchor="middle" fill="#ffd700" font-size="14" font-weight="bold" font-family="KaiTi, STKaiti, serif">🎨 颜色拾取检测 (Color Picking)</text>
  <text x="230" y="305" text-anchor="middle" fill="#ffaa00" font-size="10" font-family="KaiTi, STKaiti, serif">glReadPixels() → 读取像素颜色 → 匹配瓶子ID</text>
  <text x="230" y="330" text-anchor="middle" fill="#60efff" font-size="9" font-family="KaiTi, STKaiti, serif">每个瓶子渲染唯一颜色标识，实现精确点击检测</text>

  <!-- 交互反馈区域 -->
  <rect x="470" y="80" width="400" height="280" rx="15" fill="rgba(0,255,135,0.06)" stroke="url(#auroraGreen)" stroke-width="2" filter="url(#glow)"/>
  <text x="670" y="115" text-anchor="middle" fill="#00ff87" font-size="18" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">◈ 交互反馈效果 ◈</text>
  
  <!-- 悬停提示 -->
  <rect x="490" y="135" width="170" height="100" rx="10" fill="rgba(96,239,255,0.15)" stroke="#60efff" stroke-width="2"/>
  <text x="575" y="165" text-anchor="middle" fill="#60efff" font-size="14" font-weight="bold" font-family="KaiTi, STKaiti, serif">💬 悬停提示</text>
  <text x="575" y="190" text-anchor="middle" fill="#00bcd4" font-size="10" font-family="KaiTi, STKaiti, serif">drawHoverTooltip()</text>
  <text x="575" y="210" text-anchor="middle" fill="#00d4aa" font-size="9" font-family="KaiTi, STKaiti, serif">• 显示瓶子编号</text>
  <text x="575" y="225" text-anchor="middle" fill="#00d4aa" font-size="9" font-family="KaiTi, STKaiti, serif">• 显示颜色层数</text>
  
  <!-- 高亮预览 -->
  <rect x="680" y="135" width="170" height="100" rx="10" fill="rgba(234,128,252,0.15)" stroke="#ea80fc" stroke-width="2"/>
  <text x="765" y="165" text-anchor="middle" fill="#ea80fc" font-size="14" font-weight="bold" font-family="KaiTi, STKaiti, serif">✨ 高亮预览</text>
  <text x="765" y="190" text-anchor="middle" fill="#b388ff" font-size="10" font-family="KaiTi, STKaiti, serif">calcPourAmount()</text>
  <text x="765" y="210" text-anchor="middle" fill="#00d4aa" font-size="9" font-family="KaiTi, STKaiti, serif">• 预览可倒层数</text>
  <text x="765" y="225" text-anchor="middle" fill="#00d4aa" font-size="9" font-family="KaiTi, STKaiti, serif">• 高亮目标瓶</text>
  
  <!-- 可操作提示 -->
  <rect x="490" y="250" width="360" height="95" rx="10" fill="rgba(0,255,135,0.12)" stroke="#00ff87" stroke-width="2"/>
  <text x="670" y="280" text-anchor="middle" fill="#00ff87" font-size="14" font-weight="bold" font-family="KaiTi, STKaiti, serif">🎮 可操作提示</text>
  <text x="670" y="305" text-anchor="middle" fill="#00d4aa" font-size="10" font-family="KaiTi, STKaiti, serif">canPour() 检测 → 显示操作指示器</text>
  <text x="670" y="330" text-anchor="middle" fill="#60efff" font-size="9" font-family="KaiTi, STKaiti, serif">绿色箭头 ↓ = 可倒入 | 红色 ✗ = 不可倒入</text>
  
  <!-- 信息面板区域 -->
  <rect x="30" y="380" width="840" height="180" rx="15" fill="rgba(124,77,255,0.06)" stroke="url(#auroraPurple)" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="415" text-anchor="middle" fill="#b388ff" font-size="18" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">◈ 瓶子信息面板 ◈</text>
  
  <!-- 面板内容 -->
  <rect x="50" y="435" width="250" height="110" rx="10" fill="rgba(96,239,255,0.1)" stroke="#60efff" stroke-width="1"/>
  <text x="175" y="460" text-anchor="middle" fill="#60efff" font-size="13" font-weight="bold" font-family="KaiTi, STKaiti, serif">drawBottleInfoPanel()</text>
  <text x="65" y="485" fill="#00d4aa" font-size="10" font-family="KaiTi, STKaiti, serif">📍 位置: 左上角固定显示</text>
  <text x="65" y="505" fill="#00d4aa" font-size="10" font-family="KaiTi, STKaiti, serif">🍾 内容: 瓶子ID + 颜色详情</text>
  <text x="65" y="525" fill="#00d4aa" font-size="10" font-family="KaiTi, STKaiti, serif">🎨 颜色: 中文名称显示</text>
  
  <!-- 示例面板 -->
  <rect x="330" y="435" width="200" height="110" rx="8" fill="rgba(0,0,0,0.4)" stroke="#00ff87" stroke-width="2"/>
  <text x="430" y="460" text-anchor="middle" fill="#00ff87" font-size="12" font-weight="bold" font-family="KaiTi, STKaiti, serif">瓶子 #3</text>
  <text x="345" y="485" fill="#ff6b6b" font-size="11" font-family="KaiTi, STKaiti, serif">● 红色</text>
  <text x="345" y="505" fill="#60efff" font-size="11" font-family="KaiTi, STKaiti, serif">● 蓝色</text>
  <text x="345" y="525" fill="#00ff87" font-size="11" font-family="KaiTi, STKaiti, serif">● 绿色</text>
  <text x="430" y="540" text-anchor="middle" fill="#60efff" font-size="9" font-family="KaiTi, STKaiti, serif">(示例)</text>
  
  <!-- 颜色名称映射 -->
  <rect x="560" y="435" width="290" height="110" rx="10" fill="rgba(255,215,0,0.1)" stroke="#ffd700" stroke-width="1"/>
  <text x="705" y="460" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold" font-family="KaiTi, STKaiti, serif">getColorName() 颜色映射</text>
  <text x="575" y="485" fill="#ff6b6b" font-size="10" font-family="KaiTi, STKaiti, serif">R→红色 G→绿色 B→蓝色</text>
  <text x="575" y="505" fill="#ffd700" font-size="10" font-family="KaiTi, STKaiti, serif">Y→黄色 P→紫色 O→橙色</text>
  <text x="575" y="525" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">C→青色 W→白色 K→黑色</text>
  
  <!-- 底部流程 -->
  <rect x="30" y="580" width="840" height="90" rx="12" fill="rgba(255,215,0,0.06)" stroke="url(#galaxyGold)" stroke-width="2"/>
  <text x="450" y="615" text-anchor="middle" fill="#ffd700" font-size="16" font-weight="bold" font-family="KaiTi, STKaiti, serif">◈ 交互流程 ◈</text>
  <text x="450" y="650" text-anchor="middle" fill="#60efff" font-size="12" font-family="KaiTi, STKaiti, serif">
    鼠标移动 → 颜色拾取 → 更新悬停瓶子 → 显示提示/面板 → 点击选择 → 执行倾倒
  </text>
</svg>
