<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 极光渐变背景 -->
    <linearGradient id="auroraBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1b263b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a192f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff87;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60efff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60efff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c4dff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b388ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea80fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="galaxyGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 星空背景 -->
  <rect width="800" height="650" fill="url(#auroraBg)"/>
  
  <!-- 星星点缀 -->
  <circle cx="50" cy="50" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="150" cy="30" r="1" fill="white" opacity="0.6"/>
  <circle cx="280" cy="65" r="2" fill="white" opacity="0.9"/>
  <circle cx="400" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="520" cy="55" r="1" fill="white" opacity="0.5"/>
  <circle cx="650" cy="40" r="2" fill="white" opacity="0.8"/>
  <circle cx="750" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="100" cy="620" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="300" cy="635" r="1" fill="white" opacity="0.5"/>
  <circle cx="500" cy="610" r="2" fill="white" opacity="0.8"/>
  <circle cx="700" cy="625" r="1.5" fill="white" opacity="0.6"/>
  
  <!-- 极光效果 -->
  <ellipse cx="400" cy="60" rx="350" ry="40" fill="url(#auroraGreen)" opacity="0.12" filter="url(#glowStrong)"/>
  <ellipse cx="300" cy="630" rx="320" ry="35" fill="url(#auroraBlue)" opacity="0.10" filter="url(#glowStrong)"/>
  
  <!-- 标题 -->
  <text x="400" y="50" text-anchor="middle" fill="url(#galaxyGold)" font-size="26" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">
    ✦ 得分评判系统 ✦
  </text>
  
  <!-- 三维度评分区域 -->
  <rect x="30" y="80" width="740" height="220" rx="15" fill="rgba(96,239,255,0.06)" stroke="url(#auroraBlue)" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="115" text-anchor="middle" fill="#60efff" font-size="18" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">◈ 三维度评分 (满分100分) ◈</text>
  
  <!-- 效率分 -->
  <rect x="50" y="135" width="210" height="150" rx="12" fill="rgba(238,90,90,0.15)" stroke="#ff6b6b" stroke-width="2"/>
  <text x="155" y="165" text-anchor="middle" fill="#ff6b6b" font-size="15" font-weight="bold" font-family="KaiTi, STKaiti, serif">🎯 效率分</text>
  <text x="155" y="195" text-anchor="middle" fill="#ffd700" font-size="28" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">60分</text>
  <text x="155" y="225" text-anchor="middle" fill="#00d4aa" font-size="11" font-family="KaiTi, STKaiti, serif">ratio = best / moves</text>
  <text x="155" y="248" text-anchor="middle" fill="#00d4aa" font-size="11" font-family="KaiTi, STKaiti, serif">score = ratio × 60</text>
  <text x="155" y="275" text-anchor="middle" fill="#60efff" font-size="10" font-family="KaiTi, STKaiti, serif">步数越少分越高</text>
  
  <!-- 难度加成 -->
  <rect x="295" y="135" width="210" height="150" rx="12" fill="rgba(0,255,135,0.15)" stroke="#00ff87" stroke-width="2"/>
  <text x="400" y="165" text-anchor="middle" fill="#00ff87" font-size="15" font-weight="bold" font-family="KaiTi, STKaiti, serif">⚡ 难度加成</text>
  <text x="400" y="195" text-anchor="middle" fill="#ffd700" font-size="28" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">20分</text>
  <text x="400" y="225" text-anchor="middle" fill="#00d4aa" font-size="11" font-family="KaiTi, STKaiti, serif">Easy: 10分</text>
  <text x="400" y="248" text-anchor="middle" fill="#00d4aa" font-size="11" font-family="KaiTi, STKaiti, serif">Medium: 15分</text>
  <text x="400" y="271" text-anchor="middle" fill="#00d4aa" font-size="11" font-family="KaiTi, STKaiti, serif">Hard: 20分</text>
  
  <!-- 完美奖励 -->
  <rect x="540" y="135" width="210" height="150" rx="12" fill="rgba(124,77,255,0.15)" stroke="#7c4dff" stroke-width="2"/>
  <text x="645" y="165" text-anchor="middle" fill="#b388ff" font-size="15" font-weight="bold" font-family="KaiTi, STKaiti, serif">🏆 完美奖励</text>
  <text x="645" y="195" text-anchor="middle" fill="#ffd700" font-size="28" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">20分</text>
  <text x="645" y="225" text-anchor="middle" fill="#00d4aa" font-size="11" font-family="KaiTi, STKaiti, serif">≤best: 20分</text>
  <text x="645" y="248" text-anchor="middle" fill="#00d4aa" font-size="11" font-family="KaiTi, STKaiti, serif">≤best+2: 15分</text>
  <text x="645" y="271" text-anchor="middle" fill="#00d4aa" font-size="11" font-family="KaiTi, STKaiti, serif">≤best+5: 10分</text>

  <!-- 评级系统区域 -->
  <rect x="30" y="320" width="740" height="250" rx="15" fill="rgba(255,215,0,0.06)" stroke="url(#galaxyGold)" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="355" text-anchor="middle" fill="#ffd700" font-size="18" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">◈ 评级系统 ◈</text>
  
  <!-- S级 -->
  <rect x="50" y="380" width="100" height="80" rx="10" fill="rgba(255,215,0,0.3)" stroke="#ffd700" stroke-width="3" filter="url(#glow)"/>
  <text x="100" y="420" text-anchor="middle" fill="#ffd700" font-size="36" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">S</text>
  <text x="100" y="450" text-anchor="middle" fill="#ffaa00" font-size="11" font-family="KaiTi, STKaiti, serif">95-100分</text>
  <text x="100" y="485" text-anchor="middle" fill="#ffd700" font-size="14" filter="url(#glow)">★★★★★</text>
  
  <!-- A级 -->
  <rect x="165" y="380" width="100" height="80" rx="10" fill="rgba(0,255,135,0.25)" stroke="#00ff87" stroke-width="2"/>
  <text x="215" y="420" text-anchor="middle" fill="#00ff87" font-size="32" font-weight="bold" font-family="KaiTi, STKaiti, serif">A</text>
  <text x="215" y="450" text-anchor="middle" fill="#00d4aa" font-size="11" font-family="KaiTi, STKaiti, serif">85-94分</text>
  <text x="215" y="485" text-anchor="middle" fill="#00ff87" font-size="14">★★★★☆</text>
  
  <!-- B级 -->
  <rect x="280" y="380" width="100" height="80" rx="10" fill="rgba(96,239,255,0.25)" stroke="#60efff" stroke-width="2"/>
  <text x="330" y="420" text-anchor="middle" fill="#60efff" font-size="32" font-weight="bold" font-family="KaiTi, STKaiti, serif">B</text>
  <text x="330" y="450" text-anchor="middle" fill="#00bcd4" font-size="11" font-family="KaiTi, STKaiti, serif">75-84分</text>
  <text x="330" y="485" text-anchor="middle" fill="#60efff" font-size="14">★★★☆☆</text>
  
  <!-- C级 -->
  <rect x="395" y="380" width="100" height="80" rx="10" fill="rgba(255,170,0,0.25)" stroke="#ffaa00" stroke-width="2"/>
  <text x="445" y="420" text-anchor="middle" fill="#ffaa00" font-size="32" font-weight="bold" font-family="KaiTi, STKaiti, serif">C</text>
  <text x="445" y="450" text-anchor="middle" fill="#ffd700" font-size="11" font-family="KaiTi, STKaiti, serif">60-74分</text>
  <text x="445" y="485" text-anchor="middle" fill="#ffaa00" font-size="14">★★☆☆☆</text>
  
  <!-- D级 -->
  <rect x="510" y="380" width="100" height="80" rx="10" fill="rgba(234,128,252,0.25)" stroke="#ea80fc" stroke-width="2"/>
  <text x="560" y="420" text-anchor="middle" fill="#ea80fc" font-size="32" font-weight="bold" font-family="KaiTi, STKaiti, serif">D</text>
  <text x="560" y="450" text-anchor="middle" fill="#b388ff" font-size="11" font-family="KaiTi, STKaiti, serif">40-59分</text>
  <text x="560" y="485" text-anchor="middle" fill="#ea80fc" font-size="14">★☆☆☆☆</text>
  
  <!-- E级 -->
  <rect x="625" y="380" width="100" height="80" rx="10" fill="rgba(238,90,90,0.25)" stroke="#ff6b6b" stroke-width="2"/>
  <text x="675" y="420" text-anchor="middle" fill="#ff6b6b" font-size="32" font-weight="bold" font-family="KaiTi, STKaiti, serif">E</text>
  <text x="675" y="450" text-anchor="middle" fill="#ee5a5a" font-size="11" font-family="KaiTi, STKaiti, serif">&lt;40分</text>
  <text x="675" y="485" text-anchor="middle" fill="#ff6b6b" font-size="14">☆☆☆☆☆</text>
  
  <!-- 公式区域 -->
  <rect x="50" y="510" width="700" height="50" rx="10" fill="rgba(0,188,212,0.12)" stroke="#00bcd4" stroke-width="2"/>
  <text x="400" y="535" text-anchor="middle" fill="#60efff" font-size="13" font-weight="bold" font-family="KaiTi, STKaiti, serif">📐 计算公式</text>
  <text x="400" y="555" text-anchor="middle" fill="#00ff87" font-size="12" font-family="Consolas, monospace">TotalScore = (best/moves × 60) + DifficultyBonus + PerfectBonus</text>
  
  <!-- 底部装饰 -->
  <text x="400" y="610" text-anchor="middle" fill="#60efff" font-size="12" font-family="KaiTi, STKaiti, serif" opacity="0.7">✧ 追求完美，挑战极限 ✧</text>
</svg>
