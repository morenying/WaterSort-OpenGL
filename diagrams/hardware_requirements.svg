<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="auroraBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1b263b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a192f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff87;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60efff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60efff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c4dff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b388ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea80fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="galaxyGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="500" fill="url(#auroraBg)"/>
  <circle cx="50" cy="60" r="1.5" fill="white" opacity="0.8"/><circle cx="280" cy="40" r="2" fill="white" opacity="0.9"/>
  <circle cx="650" cy="35" r="2" fill="white" opacity="0.8"/><circle cx="850" cy="25" r="1" fill="white" opacity="0.9"/>
  <circle cx="70" cy="450" r="1" fill="white" opacity="0.5"/><circle cx="830" cy="430" r="1.5" fill="white" opacity="0.7"/>
  <ellipse cx="450" cy="60" rx="400" ry="40" fill="url(#auroraGreen)" opacity="0.12" filter="url(#glowStrong)"/>
  <ellipse cx="300" cy="450" rx="350" ry="30" fill="url(#auroraBlue)" opacity="0.1" filter="url(#glowStrong)"/>
  <text x="450" y="40" text-anchor="middle" fill="url(#auroraGreen)" font-size="26" font-weight="bold" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">🖥️ 硬件环境 Hardware Requirements 🖥️</text>

  <rect x="40" y="70" width="200" height="180" rx="15" fill="rgba(0,255,135,0.1)" stroke="url(#auroraGreen)" stroke-width="2" filter="url(#glow)"/>
  <text x="140" y="100" text-anchor="middle" fill="#00ff87" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">🔲 处理器 CPU</text>
  <rect x="80" y="115" width="50" height="50" rx="8" fill="rgba(0,212,170,0.3)" stroke="#00d4aa" stroke-width="2"/>
  <rect x="90" y="125" width="30" height="30" rx="4" fill="rgba(0,255,135,0.5)" stroke="#00ff87" stroke-width="1"/>
  <line x1="80" y1="140" x2="70" y2="140" stroke="#00ff87" stroke-width="2"/>
  <line x1="130" y1="140" x2="140" y2="140" stroke="#00ff87" stroke-width="2"/>
  <line x1="105" y1="115" x2="105" y2="105" stroke="#00ff87" stroke-width="2"/>
  <line x1="105" y1="165" x2="105" y2="175" stroke="#00ff87" stroke-width="2"/>
  <text x="155" y="135" fill="#60efff" font-size="12" font-family="KaiTi, STKaiti, serif">Intel / AMD</text>
  <text x="155" y="155" fill="#00d4aa" font-size="11" font-family="KaiTi, STKaiti, serif">x86/x64架构</text>
  <rect x="55" y="185" width="170" height="25" rx="5" fill="rgba(0,255,135,0.2)" stroke="#00ff87" stroke-width="1"/>
  <text x="140" y="203" text-anchor="middle" fill="#00ff87" font-size="11" font-family="KaiTi, STKaiti, serif">最低: 双核 1.5GHz</text>
  <rect x="55" y="215" width="170" height="25" rx="5" fill="rgba(96,239,255,0.15)" stroke="#60efff" stroke-width="1"/>
  <text x="140" y="233" text-anchor="middle" fill="#60efff" font-size="11" font-family="KaiTi, STKaiti, serif">推荐: 四核 2.0GHz+</text>
  <rect x="260" y="70" width="200" height="180" rx="15" fill="rgba(96,239,255,0.1)" stroke="url(#auroraBlue)" stroke-width="2" filter="url(#glow)"/>
  <text x="360" y="100" text-anchor="middle" fill="#60efff" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">💾 内存 RAM</text>
  <rect x="290" y="115" width="60" height="25" rx="3" fill="rgba(96,239,255,0.3)" stroke="#60efff" stroke-width="2"/>
  <rect x="295" y="120" width="8" height="15" rx="1" fill="#00bcd4"/><rect x="307" y="120" width="8" height="15" rx="1" fill="#00bcd4"/>
  <rect x="319" y="120" width="8" height="15" rx="1" fill="#00bcd4"/><rect x="331" y="120" width="8" height="15" rx="1" fill="#00bcd4"/>
  <rect x="343" y="120" width="4" height="15" rx="1" fill="#60efff" opacity="0.5"/>
  <text x="380" y="135" fill="#00bcd4" font-size="12" font-family="KaiTi, STKaiti, serif">DDR3/DDR4</text>
  <rect x="275" y="155" width="170" height="35" rx="8" fill="rgba(0,255,135,0.15)" stroke="#00ff87" stroke-width="1"/>
  <text x="360" y="178" text-anchor="middle" fill="#00ff87" font-size="14" font-family="KaiTi, STKaiti, serif">最低: 4GB</text>
  <rect x="275" y="200" width="170" height="35" rx="8" fill="rgba(96,239,255,0.2)" stroke="#60efff" stroke-width="1"/>
  <text x="360" y="223" text-anchor="middle" fill="#60efff" font-size="14" font-family="KaiTi, STKaiti, serif">推荐: 8GB+</text>

  <rect x="480" y="70" width="200" height="180" rx="15" fill="rgba(124,77,255,0.1)" stroke="url(#auroraPurple)" stroke-width="2" filter="url(#glow)"/>
  <text x="580" y="100" text-anchor="middle" fill="#b388ff" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">🎮 显卡 GPU</text>
  <rect x="510" y="115" width="70" height="45" rx="5" fill="rgba(124,77,255,0.3)" stroke="#7c4dff" stroke-width="2"/>
  <rect x="520" y="125" width="20" height="25" rx="2" fill="#b388ff" opacity="0.6"/>
  <rect x="545" y="125" width="20" height="25" rx="2" fill="#ea80fc" opacity="0.6"/>
  <line x1="510" y1="165" x2="510" y2="175" stroke="#7c4dff" stroke-width="3"/>
  <line x1="530" y1="165" x2="530" y2="175" stroke="#7c4dff" stroke-width="3"/>
  <line x1="550" y1="165" x2="550" y2="175" stroke="#7c4dff" stroke-width="3"/>
  <line x1="570" y1="165" x2="570" y2="175" stroke="#7c4dff" stroke-width="3"/>
  <text x="600" y="135" fill="#ea80fc" font-size="11" font-family="KaiTi, STKaiti, serif">支持</text>
  <text x="600" y="152" fill="#b388ff" font-size="11" font-family="KaiTi, STKaiti, serif">OpenGL 2.0+</text>
  <rect x="495" y="185" width="170" height="25" rx="5" fill="rgba(124,77,255,0.2)" stroke="#7c4dff" stroke-width="1"/>
  <text x="580" y="203" text-anchor="middle" fill="#b388ff" font-size="11" font-family="KaiTi, STKaiti, serif">集成显卡即可运行</text>
  <rect x="495" y="215" width="170" height="25" rx="5" fill="rgba(234,128,252,0.15)" stroke="#ea80fc" stroke-width="1"/>
  <text x="580" y="233" text-anchor="middle" fill="#ea80fc" font-size="11" font-family="KaiTi, STKaiti, serif">推荐: 独立显卡</text>
  <rect x="700" y="70" width="160" height="180" rx="15" fill="rgba(255,215,0,0.1)" stroke="url(#galaxyGold)" stroke-width="2" filter="url(#glow)"/>
  <text x="780" y="100" text-anchor="middle" fill="#ffd700" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">🖥️ 显示器</text>
  <rect x="735" y="115" width="50" height="35" rx="3" fill="rgba(255,215,0,0.3)" stroke="#ffd700" stroke-width="2"/>
  <rect x="740" y="120" width="40" height="25" rx="2" fill="rgba(0,255,135,0.3)"/>
  <rect x="755" y="150" width="20" height="8" fill="#ffaa00"/>
  <rect x="745" y="158" width="40" height="5" rx="2" fill="#ffd700"/>
  <text x="810" y="140" fill="#ffaa00" font-size="10" font-family="KaiTi, STKaiti, serif">分辨率</text>
  <rect x="715" y="175" width="130" height="30" rx="5" fill="rgba(255,215,0,0.2)" stroke="#ffd700" stroke-width="1"/>
  <text x="780" y="195" text-anchor="middle" fill="#ffd700" font-size="12" font-family="KaiTi, STKaiti, serif">1280×800</text>
  <rect x="715" y="210" width="130" height="30" rx="5" fill="rgba(0,255,135,0.15)" stroke="#00ff87" stroke-width="1"/>
  <text x="780" y="230" text-anchor="middle" fill="#00ff87" font-size="12" font-family="KaiTi, STKaiti, serif">或更高</text>

  <rect x="40" y="270" width="400" height="100" rx="15" fill="rgba(234,128,252,0.08)" stroke="#ea80fc" stroke-width="2" filter="url(#glow)"/>
  <text x="240" y="300" text-anchor="middle" fill="#ea80fc" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">💿 存储空间</text>
  <rect x="60" y="315" width="160" height="40" rx="8" fill="rgba(0,255,135,0.15)" stroke="#00ff87" stroke-width="1"/>
  <text x="140" y="340" text-anchor="middle" fill="#00ff87" font-size="13" font-family="KaiTi, STKaiti, serif">程序大小: ~5MB</text>
  <rect x="240" y="315" width="180" height="40" rx="8" fill="rgba(96,239,255,0.15)" stroke="#60efff" stroke-width="1"/>
  <text x="330" y="340" text-anchor="middle" fill="#60efff" font-size="13" font-family="KaiTi, STKaiti, serif">运行时: ~50MB 内存</text>
  <rect x="460" y="270" width="400" height="100" rx="15" fill="rgba(0,188,212,0.08)" stroke="#00bcd4" stroke-width="2" filter="url(#glow)"/>
  <text x="660" y="300" text-anchor="middle" fill="#00bcd4" font-size="18" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">🖱️ 输入设备</text>
  <rect x="480" y="315" width="170" height="40" rx="8" fill="rgba(0,255,135,0.15)" stroke="#00ff87" stroke-width="1"/>
  <text x="565" y="340" text-anchor="middle" fill="#00ff87" font-size="13" font-family="KaiTi, STKaiti, serif">🖱️ 鼠标 (必需)</text>
  <rect x="670" y="315" width="170" height="40" rx="8" fill="rgba(124,77,255,0.15)" stroke="#7c4dff" stroke-width="1"/>
  <text x="755" y="340" text-anchor="middle" fill="#b388ff" font-size="13" font-family="KaiTi, STKaiti, serif">⌨️ 键盘 (可选)</text>
  <rect x="40" y="390" width="820" height="90" rx="12" fill="rgba(0,0,0,0.35)" stroke="url(#auroraGreen)" stroke-width="1"/>
  <text x="450" y="420" text-anchor="middle" fill="#00ff87" font-size="16" font-family="KaiTi, STKaiti, serif" filter="url(#glow)">✨ 硬件要求总结</text>
  <text x="100" y="450" fill="#60efff" font-size="12" font-family="KaiTi, STKaiti, serif">• 本游戏对硬件要求较低，大多数现代电脑均可流畅运行</text>
  <text x="100" y="470" fill="#b388ff" font-size="12" font-family="KaiTi, STKaiti, serif">• 核心要求：支持 OpenGL 2.0 的显卡驱动</text>
  <text x="550" y="450" fill="#ffd700" font-size="12" font-family="KaiTi, STKaiti, serif">• 推荐使用独立显卡以获得更好的渲染效果</text>
  <text x="550" y="470" fill="#ea80fc" font-size="12" font-family="KaiTi, STKaiti, serif">• 鼠标是主要操作设备，键盘用于快捷键</text>
</svg>